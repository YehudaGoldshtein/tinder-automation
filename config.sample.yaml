user:
  name: YourName
  phone: "+1234567890"

browser:
  headless: false
  userDataDir: ./browser-data
  slowMo: 50
  viewport:
    width: 1280
    height: 800

swipe:
  dailyLimit: 50
  likeRatio: 0.6
  delayBetweenSwipes:
    min: 5000
    max: 15000
  longPauseChance: 0.10
  longPauseRange:
    min: 30000
    max: 120000

messages:
  openers:
    - "Hey {{name}}! What's the most spontaneous thing you've done recently?"
    - "Hi {{name}} 👋 what brings you here?"
    - "{{name}}! Coffee or cocktails for a first meetup?"
  followUp:
    staleAfterHours: 48
    templates:
      - "Hey, how's your week going?"
      - "Still up for meeting sometime?"
  maxNewOpeners: 10

logging:
  level: info
  file: ./logs/tinder-auto.log
